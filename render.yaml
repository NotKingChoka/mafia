services:
  - type: web
    name: mafia-online
    runtime: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: WEBRTC_STUN_URL
        value: stun:stun.l.google.com:19302
      - key: BOT_AI_ENABLED
        value: "false"
      - key: BOT_AI_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: BOT_AI_MODEL
        value: gpt-4o-mini
      - key: BOT_AI_TIMEOUT_MS
        value: "4500"
